<div class="min-h-screen flex items-center justify-center bg-ink-50 px-4">
  <div class="w-full max-w-md card p-8">
    <h1 class="font-display text-2xl font-semibold text-ink-900 mb-1">Welcome back</h1>
    <p class="text-sm text-ink-600 mb-6">Sign in to HealthVerse AI</p>

    <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4">
      <div>
        <label class="field-label" for="username">Username</label>
        <input id="username" formControlName="username" type="text" autocomplete="username" class="field-input" />
      </div>

      <div>
        <label class="field-label" for="password">Password</label>
        <input id="password" formControlName="password" type="password" autocomplete="current-password" class="field-input" />
      </div>

      @if (errorMessage()) {
        <p class="text-sm text-status-cancelled">{{ errorMessage() }}</p>
      }

      <button type="submit" [disabled]="form.invalid || loading()" class="btn-primary w-full">
        {{ loading() ? 'Signing in...' : 'Sign in' }}
      </button>
    </form>

    <p class="text-sm text-ink-600 mt-6 text-center">
      Don't have an account?
      <a routerLink="/register" class="text-brand-700 font-medium hover:underline">Register</a>
    </p>
  </div>
</div>
