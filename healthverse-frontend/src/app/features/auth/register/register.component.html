<div class="min-h-screen flex items-center justify-center bg-ink-50 px-4 py-10">
  <div class="w-full max-w-lg card p-8">
    <h1 class="font-display text-2xl font-semibold text-ink-900 mb-1">Create your account</h1>
    <p class="text-sm text-ink-600 mb-6">Join HealthVerse AI as a patient or a doctor</p>

    <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4">
      <div>
        <label class="field-label">I am registering as</label>
        <div class="grid grid-cols-2 gap-3">
          <label class="flex items-center gap-2 rounded-lg border border-ink-200 px-3 py-2 cursor-pointer"
                 [class.border-brand-500]="!isDoctor()" [class.bg-brand-50]="!isDoctor()">
            <input type="radio" formControlName="role" value="PATIENT" class="accent-brand-700" />
            <span class="text-sm font-medium text-ink-800">Patient</span>
          </label>
          <label class="flex items-center gap-2 rounded-lg border border-ink-200 px-3 py-2 cursor-pointer"
                 [class.border-brand-500]="isDoctor()" [class.bg-brand-50]="isDoctor()">
            <input type="radio" formControlName="role" value="DOCTOR" class="accent-brand-700" />
            <span class="text-sm font-medium text-ink-800">Doctor</span>
          </label>
        </div>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="field-label" for="username">Username</label>
          <input id="username" formControlName="username" type="text" autocomplete="username" class="field-input" />
        </div>
        <div>
          <label class="field-label" for="email">Email</label>
          <input id="email" formControlName="email" type="email" autocomplete="email" class="field-input" />
        </div>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="field-label" for="password">Password</label>
          <input id="password" formControlName="password" type="password" autocomplete="new-password" class="field-input" />
        </div>
        <div>
          <label class="field-label" for="phone_number">Phone number</label>
          <input id="phone_number" formControlName="phone_number" type="text" class="field-input" />
        </div>
      </div>

      @if (!isDoctor()) {
        <div class="border-t border-ink-100 pt-4 space-y-4">
          <p class="text-xs font-medium text-ink-400 uppercase tracking-wide">Patient details (optional)</p>
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="field-label" for="blood_group">Blood group</label>
              <input id="blood_group" formControlName="blood_group" type="text" placeholder="e.g. O+" class="field-input" />
            </div>
            <div>
              <label class="field-label" for="emergency_contact">Emergency contact</label>
              <input id="emergency_contact" formControlName="emergency_contact" type="text" class="field-input" />
            </div>
          </div>
          <div>
            <label class="field-label" for="allergies">Allergies</label>
            <input id="allergies" formControlName="allergies" type="text" class="field-input" />
          </div>
        </div>
      }

      @if (isDoctor()) {
        <div class="border-t border-ink-100 pt-4 space-y-4">
          <p class="text-xs font-medium text-ink-400 uppercase tracking-wide">Doctor details (required)</p>
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="field-label" for="specialization">Specialization</label>
              <input id="specialization" formControlName="specialization" type="text" placeholder="e.g. Cardiology" class="field-input" />
            </div>
            <div>
              <label class="field-label" for="license_number">License number</label>
              <input id="license_number" formControlName="license_number" type="text" class="field-input" />
            </div>
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="field-label" for="years_of_experience">Years of experience</label>
              <input id="years_of_experience" formControlName="years_of_experience" type="number" min="0" class="field-input" />
            </div>
            <div>
              <label class="field-label" for="consultation_fee">Consultation fee</label>
              <input id="consultation_fee" formControlName="consultation_fee" type="number" min="0" step="0.01" class="field-input" />
            </div>
          </div>
        </div>
      }

      @if (errorMessage()) {
        <p class="text-sm text-status-cancelled">{{ errorMessage() }}</p>
      }

      <button type="submit" [disabled]="form.invalid || loading()" class="btn-primary w-full">
        {{ loading() ? 'Creating account...' : 'Create account' }}
      </button>
    </form>

    <p class="text-sm text-ink-600 mt-6 text-center">
      Already have an account?
      <a routerLink="/login" class="text-brand-700 font-medium hover:underline">Sign in</a>
    </p>
  </div>
</div>
